<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <!-- 防 FOUC:在 React 加载前根据 localStorage 主题 + 系统偏好,挂好 data-theme -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem('wol-theme');
          var dark;
          if (m === 'dark') dark = true;
          else if (m === 'light') dark = false;
          else dark = window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.setAttribute('data-theme', 'dark');
        } catch (e) {}
      })();
    </script>
    <!-- Noto Sans + Noto Sans SC(中文),离线时自动回退到系统字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <title>ESP32 WoL 控制台</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
